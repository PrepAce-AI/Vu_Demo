<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ học viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 bg-white p-5 rounded shadow text-center">

            <h3 class="mb-4">Chào mừng đến với Hệ thống Học Tập!</h3>

            <img th:src="${user != null && user.avatarUrl != null ? user.avatarUrl : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                 class="rounded-circle mb-3 border" width="120" height="120" alt="Avatar">

            <h4 class="text-primary" th:text="${user != null && user.fullName != null ? user.fullName : 'Học viên mới'}">Tên Học Viên</h4>
            <p class="text-muted" th:text="${user != null ? user.email : 'Chưa có email'}">email@example.com</p>

            <div class="d-grid gap-2 mt-4">
                <a href="/edit-profile" class="btn btn-outline-primary">Chỉnh sửa hồ sơ & Đổi Avatar</a>

                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-danger w-100">Đăng xuất</button>
                </form>
            </div>

        </div>
    </div>
</div>

</body>
</html>
