<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa Hồ sơ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 bg-white p-5 rounded shadow">
            <h3 class="text-center mb-4">Chỉnh sửa Hồ sơ</h3>

            <div th:if="${param.updated}" class="alert alert-success text-center">
                Cập nhật thông tin thành công!
            </div>

            <form th:action="@{/edit-profile}" method="post" enctype="multipart/form-data">

                <div class="mb-3 text-center">
                    <img th:src="${user.avatarUrl != null ? user.avatarUrl : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                         class="rounded-circle mb-2 border" width="100" height="100" alt="Avatar hiện tại">
                    <br>
                    <label class="form-label fw-bold">Chọn ảnh đại diện mới (Không bắt buộc)</label>
                    <input class="form-control" type="file" name="avatarFile" accept="image/png, image/jpeg">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email (Không thể thay đổi)</label>
                    <input type="email" class="form-control" th:value="${user.email}" disabled>
                </div>

                <div class="mb-4">
                    <label class="form-label">Họ và Tên</label>
                    <input type="text" class="form-control" name="fullName" th:value="${user.fullName}" required>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/profile" class="btn btn-secondary">Quay lại</a>
                    <button type="submit" class="btn btn-success">Lưu thay đổi</button>
                </div>
            </form>

        </div>
    </div>
</div>

</body>
</html>
