<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 bg-white p-5 rounded shadow">
            <h3 class="text-center mb-4">Đặt mật khẩu mới</h3>

            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" name="token" th:value="${token}">

                <div class="mb-3">
                    <label class="form-label">Mật khẩu mới</label>
                    <input type="password" class="form-control" name="password" minlength="6" required placeholder="Nhập ít nhất 6 ký tự">
                </div>
                <button type="submit" class="btn btn-success w-100">Xác nhận đổi mật khẩu</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
