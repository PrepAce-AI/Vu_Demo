<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 bg-white p-5 rounded shadow">
            <h3 class="text-center mb-4">Quên mật khẩu</h3>

            <div th:if="${param.success}" class="alert alert-success text-center">
                Một email hướng dẫn đặt lại mật khẩu đã được gửi! Vui lòng kiểm tra hộp thư.
            </div>
            <div th:if="${param.error_not_found}" class="alert alert-danger text-center">
                Email này không tồn tại trong hệ thống!
            </div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nhập Email tài khoản của bạn</label>
                    <input type="email" class="form-control" name="email" placeholder="email@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">Gửi yêu cầu</button>
                <div class="text-center">
                    <a href="/login" class="text-decoration-none">Quay lại Đăng nhập</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
