<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký tài khoản - Hệ thống Học Tập</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5 bg-white p-5 rounded shadow">
      <h3 class="text-center mb-4">Đăng ký Học viên</h3>
      <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>
      <form th:action="@{/register}" method="post">
        <div class="mb-3">
          <label class="form-label">Họ và tên</label>
          <input type="text" class="form-control" name="fullName" placeholder="VD: Nguyễn Văn A" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" placeholder="email@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Mật khẩu</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-3">Đăng ký ngay</button>
      </form>

      <div class="text-center mt-3">
        Đã có tài khoản? <a href="/login">Đăng nhập</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
